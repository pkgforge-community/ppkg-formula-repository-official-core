summary: Terminal multiplexer
web-url: https://tmux.github.io
src-url: https://github.com/tmux/tmux/releases/download/3.6a/tmux-3.6a.tar.gz
src-sha: b6d8d9c76585db8ef5fa00d4931902fa4b8cbe8166f528f44fc403961a3f3759
license: ISC
dep-pkg: libncurses libevent libutf8proc
dep-upp: bison
install: |
    if [ "$TARGET_PLATFORM_NAME" = macos ] ; then
        configure --enable-utf8proc --disable-static
    else
        configure --enable-utf8proc
    fi
