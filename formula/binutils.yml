linkage: shared
summary: GNU binary tools for native development
git-url: https://sourceware.org/git/binutils-gdb
web-url: https://www.gnu.org/software/binutils/binutils.html
src-url: https://ftp.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
src-sha: 0f3152632a2a9ce066f20963e9bb40af7cf85b9b6c409ed892fd0676e84ecd12
license: GPL-2.0-or-later
dep-pkg: libisl libmpc libz libzstd
dep-upp: gm4 bison texinfo

install: |
    configure \
        --with-isl="$libisl_INSTALL_DIR" \
        --with-gmp="$libgmp_INSTALL_DIR" \
        --with-mpc="$libmpc_INSTALL_DIR" \
        --with-mpfr="$libmpfr_INSTALL_DIR" \
        --with-static-standard-libraries \
        --with-zstd \
        --with-system-zlib \
        --disable-gprofng \
        --disable-werror \
        --disable-nls \
        --disable-install-libbfd \
        --disable-shared \
        --enable-static \
        --enable-gold \
        --enable-64-bit-bfd \
        --enable-plugins \
        --enable-interwork \
        --enable-multilib \
        --enable-targets=all
